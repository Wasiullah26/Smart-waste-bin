# AWS Amplify Hosting — build the Vite dashboard from frontend/
# Connect this repo in Amplify; set environment variables (see readme.txt → Amplify Hosting).
version: 1
frontend:
  phases:
    preBuild:
      commands:
        - cd frontend && npm ci
    build:
      commands:
        - cd frontend && npm run build
  artifacts:
    baseDirectory: frontend/dist
    files:
      - "**/*"
  cache:
    paths:
      - frontend/node_modules/**/*
