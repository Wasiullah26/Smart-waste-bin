# AWS Amplify Hosting — Vite app lives in frontend/
#
# Amplify sometimes runs preBuild from repo root and build from frontend/ (or vice versa).
# Use one shell block so cd persists, and only "cd frontend" when that folder exists.
version: 1
frontend:
  phases:
    preBuild:
      commands:
        - |
          if [ -d frontend ]; then cd frontend; fi
          npm ci
    build:
      commands:
        - |
          if [ -d frontend ]; then cd frontend; fi
          npm run build
  artifacts:
    baseDirectory: frontend/dist
    files:
      - "**/*"
  cache:
    paths:
      - frontend/node_modules/**/*
